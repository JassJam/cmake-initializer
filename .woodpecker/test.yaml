variables:
  - &ctest_env
    CTEST_SITE:
      from_secret: CTEST_DASHBOARD_SITE
    CTEST_LOCATION:
      from_secret: CTEST_DASHBOARD_LOCATION
    CTEST_TEST_TIMEOUT:
      from_secret: CTEST_TEST_TIMEOUT_PRESET
    CTEST_DROP_METHOD:
      from_secret: CTEST_DROP_METHOD
    CDASH_AUTH_TOKEN:
      from_secret: CDASH_AUTH_TOKEN
    CTEST_DASHBOARD_MODEL:
      from_secret: CTEST_DASHBOARD_MODEL

when:
  - event: [push, pull_request]
    branch: [main, dev]
  - event: tag

steps:
  # Linux / Clang
  - name: test-linux-x64-clang
    image: ubuntu:latest
    environment:
      <<: *ctest_env
      CONFIG_NAME: linux-x64-clang
      CONFIG_OS: ubuntu-latest
      CONFIG_PRESET: unixlike-clang-debug
      CONFIG_OUTPUT: linux-x64-clang
    commands:
      - chmod +x .woodpecker/scripts/test/unix.sh
      - .woodpecker/scripts/test/unix.sh
    when:
      event: [push, pull_request, tag]

  # Linux / GCC
  - name: test-linux-x64-gcc
    image: ubuntu:latest
    environment:
      <<: *ctest_env
      CONFIG_NAME: linux-x64-gcc
      CONFIG_OS: ubuntu-latest
      CONFIG_PRESET: unixlike-gcc-debug
      CONFIG_OUTPUT: linux-x64-gcc
    commands:
      - chmod +x .woodpecker/scripts/test/unix.sh
      - .woodpecker/scripts/test/unix.sh
    when:
      event: [push, pull_request, tag]

  # macOS / Clang
  - name: test-macos-x64-clang
    image: ghcr.io/cirruslabs/macos-runner:latest
    environment:
      <<: *ctest_env
      CONFIG_NAME: macOS-x64-clang
      CONFIG_OS: macos-latest
      CONFIG_PRESET: unixlike-clang-debug
      CONFIG_OUTPUT: macOS-x64-clang
    commands:
      - chmod +x .woodpecker/scripts/test/macos.sh
      - .woodpecker/scripts/test/macos.sh
    when:
      event: [push, pull_request, tag]

  - name: test-macos-x64-gcc
    image: macos-latest
    environment:
      <<: *ctest_env
      CONFIG_NAME: macOS-x64-gcc
      CONFIG_OS: macos-latest
      CONFIG_PRESET: unixlike-gcc-debug
      CONFIG_OUTPUT: macOS-x64-gcc
    commands:
      - chmod +x .woodpecker/scripts/test/macos.sh
      - .woodpecker/scripts/test/macos.sh
    when:
      event: [push, pull_request, tag]

  # Windows / Clang
  - name: test-windows-x64-clang
    image: mcr.microsoft.com/windows/servercore:ltsc2022
    environment:
      <<: *ctest_env
      CONFIG_NAME: windows-x64-clang
      CONFIG_OS: windows-latest
      CONFIG_PRESET: windows-clang-debug
      CONFIG_OUTPUT: windows-x64-clang
    commands:
      - pwsh -NonInteractive -File .woodpecker/scripts/test/windows.ps1
    when:
      event: [push, pull_request, tag]

  - name: test-windows-x64-msvc
    image: mcr.microsoft.com/windows/servercore:ltsc2022
    environment:
      <<: *ctest_env
      CONFIG_NAME: windows-x64-msvc
      CONFIG_OS: windows-latest
      CONFIG_PRESET: windows-msvc-debug
      CONFIG_OUTPUT: windows-x64-msvc
    commands:
      - pwsh -NonInteractive -File .woodpecker/scripts/test/windows.ps1
    when:
      event: [push, pull_request, tag]

  # Emscripten
  - name: test-emscripten-debug
    image: emscripten/emsdk:latest
    environment:
      <<: *ctest_env
      CONFIG_NAME: emscripten-debug
      CONFIG_OS: ubuntu-latest
      CONFIG_PRESET: emscripten-debug
      CONFIG_OUTPUT: wasm-debug
    commands:
      - chmod +x .woodpecker/scripts/test/emscripten.sh
      - .woodpecker/scripts/test/emscripten.sh
    when:
      event: [push, pull_request, tag]

  - name: test-emscripten-release
    image: emscripten/emsdk:latest
    environment:
      <<: *ctest_env
      CONFIG_NAME: emscripten-release
      CONFIG_OS: ubuntu-latest
      CONFIG_PRESET: emscripten-release
      CONFIG_OUTPUT: wasm-release
    commands:
      - chmod +x .woodpecker/scripts/test/emscripten.sh
      - .woodpecker/scripts/test/emscripten.sh
    when:
      event: [push, pull_request, tag]