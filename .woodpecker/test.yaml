when:
  - event: [pull_request]
    branch: [main, dev]

steps:
  # Linux / Clang
  - name: test-linux-x64-clang
    image: ubuntu:latest
    environment:
      CONFIG_NAME: linux-x64-clang
      CONFIG_OS: ubuntu-latest
      CONFIG_PRESET: unixlike-clang-debug
      CONFIG_OUTPUT: linux-x64-clang
    commands:
      - chmod +x .woodpecker/scripts/test/unix.sh
      - .woodpecker/scripts/test/unix.sh
    when:
    - event: [pull_request]
      branch: [main, dev]

  # Linux / GCC
  - name: test-linux-x64-gcc
    image: ubuntu:latest
    environment:
      CONFIG_NAME: linux-x64-gcc
      CONFIG_OS: ubuntu-latest
      CONFIG_PRESET: unixlike-gcc-debug
      CONFIG_OUTPUT: linux-x64-gcc
    commands:
      - chmod +x .woodpecker/scripts/test/unix.sh
      - .woodpecker/scripts/test/unix.sh
    when:
    - event: [pull_request]
      branch: [main, dev]

  # Emscripten
  - name: test-emscripten-debug
    image: emscripten/emsdk:latest
    environment:
      CONFIG_NAME: emscripten-debug
      CONFIG_OS: ubuntu-latest
      CONFIG_PRESET: emscripten-debug
      CONFIG_OUTPUT: wasm-debug
    commands:
      - chmod +x .woodpecker/scripts/test/emscripten.sh
      - .woodpecker/scripts/test/emscripten.sh
    when:
    - event: [pull_request]
      branch: [main, dev]