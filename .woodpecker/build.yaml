when:
  - event: [pull_request]
    branch: [main, dev]

steps:
  # Linux / Clang - x86_x64
  - name: build-linux-x86_x64-clang-debug
    image: dockcross/linux-x64-clang
    environment:
      CONFIG_PRESET: unixlike-clang-debug
    commands:
      - cmake -S . -B ./out/build/build-linux-x64-clang-debug --preset unixlike-clang-debug-x86_x64
    when:
    - event: [pull_request]
      branch: [main, dev]

  # Linux / Clang - x86
  - name: build-linux-x86-clang-debug
    image: dockcross/linux-x64-clang
    environment:
      CONFIG_PRESET: unixlike-clang-debug
    commands:
      - cmake -S . -B ./out/build/build-linux-x64-clang-debug --preset unixlike-clang-debug-x86
    when:
    - event: [pull_request]
      branch: [main, dev]

  # Linux / GCC - x86_x64
  - name: build-linux-x64-gcc-debug
    image: dockcross/linux-x86_64-full
    environment:
      CONFIG_PRESET: unixlike-gcc-debug
    commands:
      - cmake -S . -B ./out/build/build-linux-x64-gcc-debug --preset unixlike-gcc-debug
    when:
    - event: [pull_request]
      branch: [main, dev]

  # Emscripten
  - name: build-emscripten-debug
    image: emscripten/emsdk:latest
    commands:
      - export XMAKE_ROOT=y
      - chmod +x .woodpecker/scripts/test/setup-emscripten.sh
      - .woodpecker/scripts/test/setup-emscripten.sh
      - cmake -S . -B ./out/build/build-emscripten-debug --preset emscripten-debug
    when:
    - event: [pull_request]
      branch: [main, dev]
