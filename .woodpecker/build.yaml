when:
  - event: [pull_request]
    branch: [main, dev]

steps:
  # Linux / Clang - x86_x64
  - name: build-linux-x86_x64-clang-debug
    image: dockcross/linux-x64-clang
    volumes:
      - build-artifacts:/artifacts
    commands:
      - cmake -S . -B build/unixlike-x64-clang-debug --preset unixlike-x64-clang-debug
      - cmake --build build/unixlike-x64-clang-debug
      - cp -r build/unixlike-x64-clang-debug /artifacts/
    when:
    - event: [pull_request]
      branch: [main, dev]

  # Linux / Clang - x86
  - name: build-linux-x86-clang-debug
    image: dockcross/linux-x64-clang
    volumes:
      - build-artifacts:/artifacts
    commands:
      - chmod +x ./.woodpecker/scripts/test/setup-clang-unix-x86.sh
      - .woodpecker/scripts/test/setup-clang-unix-x86.sh
      - cmake -S . -B build/unixlike-x86-clang-debug --preset unixlike-x86-clang-debug
      - cmake --build build/unixlike-x86-clang-debug
      - cp -r build/unixlike-x86-clang-debug /artifacts/
    when:
    - event: [pull_request]
      branch: [main, dev]

  # Linux / GCC - x86_x64
  - name: build-linux-x86_x64-gcc-debug
    image: dockcross/linux-x86_64-full
    volumes:
      - build-artifacts:/artifacts
    commands:
      - cmake -S . -B build/unixlike-x64-gcc-debug --preset unixlike-x64-gcc-debug
      - cmake --build build/unixlike-x64-gcc-debug
      - cp -r build/unixlike-x64-gcc-debug /artifacts/
    when:
    - event: [pull_request]
      branch: [main, dev]

  # Linux / GCC - x86
  - name: build-linux-x86-gcc-debug
    image: dockcross/linux-x86
    volumes:
      - build-artifacts:/artifacts
    commands:
      - cmake -S . -B build/unixlike-x86-gcc-debug --preset unixlike-x86-gcc-debug
      - cmake --build build/unixlike-x86-gcc-debug
      - cp -r build/unixlike-x86-gcc-debug /artifacts/
    when:
    - event: [pull_request]
      branch: [main, dev]

  # Emscripten
  - name: build-emscripten-debug
    image: dockcross/web-wasm
    commands:
      - cmake -S . -B build/emscripten-debug --preset emscripten-debug
      - cmake --build build/emscripten-debug
    when:
    - event: [pull_request]
      branch: [main, dev]
